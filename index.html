<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adrenalyn XL FIFA World Cup 2026 Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>⚽ Adrenalyn XL FIFA World Cup 2026 Tracker</h1>
      <p class="subtitle">Track your collection, duplicates, missing cards, and team progress.</p>
    </header>

    <section class="panel">
      <div class="progress-header">
        <h2>Collection Progress</h2>
        <div id="stats">Owned 0 / 0 (0%)</div>
      </div>

      <div id="progressBar" aria-label="Collection progress">
        <div id="progressFill"></div>
      </div>

      <div class="button-row">
        <button type="button" onclick="generateTrade()">🔁 Generate Trade List</button>
        <button type="button" onclick="shareCollection()">🔗 Share Collection</button>
        <button type="button" onclick="resetCollection()">🗑 Reset Collection</button>
      </div>
    </section>

    <section class="panel">
      <div class="search-row">
        <input
          id="search"
          type="text"
          placeholder="Search by player, team, card number, type, subtype, set or rarity"
        />
      </div>

      <div class="filter-row">
        <select id="setFilter">
          <option value="">All Sets</option>
        </select>

        <select id="teamFilter">
          <option value="">All Teams</option>
        </select>

        <select id="rarityFilter">
          <option value="">All Rarities</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <h2>Team Progress</h2>
      <div id="teamProgress" class="team-progress"></div>
    </section>

    <section class="panel">
      <div class="cards-header">
        <h2>Cards</h2>
        <div id="cardCountLabel">Showing 0 cards</div>
      </div>
      <div id="cardGrid" class="card-grid"></div>
    </section>

    <section class="panel">
      <h2>Trade List</h2>
      <pre id="tradeList">No trade list generated yet.</pre>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
